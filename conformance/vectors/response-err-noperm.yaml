notes: "The NOPERM authorization refusal (Synap's admin-ACL, synap_rpc/server.rs:243-245) — a bare RESP3-family auth token, emitted verbatim per the canonical error grammar (SPEC-008 CAN-030/CAN-031). NOPERM was unmodeled until the BN-023 errata and joins {NOAUTH, WRONGPASS, NOPERM, NOPROTO} as a recognized auth-class code (CLT-051). Covers WIRE-040, SPEC-008 CAN-031."

name: Rust Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ '**' ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    strategy:
      # Without this, one OS failing cancels the other two and hides whether
      # the failure is platform-specific — which is the only reason to run a
      # 3-OS matrix at all.
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
    - name: Install minimal stable
      uses: dtolnay/rust-toolchain@stable
    
    - uses: actions/checkout@v5
    
      with:
    
        submodules: true
    
    - uses: Swatinem/rust-cache@v2
      # MONOREPO: Uncomment and set workspaces if in subdirectory
      # with:
      #   workspaces: 'subdirectory'
    
    - name: Install mold (Linux only)
      if: runner.os == 'Linux'
      uses: rui314/setup-mold@v1
    
    - name: Configure mold linker (Linux only)
      if: runner.os == 'Linux'
      # MONOREPO: Add working-directory if in subdirectory
      # working-directory: ./subdirectory
      run: |
        mkdir -p .cargo
        echo "[target.x86_64-unknown-linux-gnu]" >> .cargo/config.toml
        echo "linker = \"clang\"" >> .cargo/config.toml
        echo "rustflags = [\"-C\", \"link-arg=-fuse-ld=/usr/local/bin/mold\"]" >> .cargo/config.toml
    
    - name: Install nextest
      uses: taiki-e/install-action@nextest
    
    - name: Build
      # MONOREPO: Add working-directory if in subdirectory
      # working-directory: ./subdirectory
      run: cargo build --tests --workspace
    
    - name: Run tests
      # No `|| cargo test` fallback: the template's intent was to cover a
      # missing nextest, but `||` also fires when nextest RUNS and a test
      # FAILS, silently re-running the suite — an accidental retry that greens
      # a flake. nextest is installed by the step above, so it is never missing.
      run: cargo nextest run --workspace
    
    - name: Upload test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: junit-${{ matrix.os }}.xml
        path: target/nextest/default/junit.xml
        if-no-files-found: ignore
    
    - name: Security audit
      # Was a step that only echoed "audit skipped" and could not fail — a
      # green check for work never done. Now it actually audits. Runs on Linux
      # only: the advisory DB is platform-independent, so auditing three times
      # buys nothing but minutes. A `run:` step (not `uses:`) so the job's
      # `working-directory: rust` applies — the workspace is not at the root.
      if: runner.os == 'Linux'
      run: |
        cargo install cargo-audit --locked
        cargo audit


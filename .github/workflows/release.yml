name: Release

# PKG-011: one release train — every registry publishes from ONE tag, in
# lockstep. Until this existed, releasing meant running four publish commands by
# hand, which is how a PyPI/NuGet token ends up living in a product repo. No
# credential belongs in a repository; the ones below live in GitHub's secret
# store, and PyPI needs no credential at all (see the pypi job).
#
# Trigger: push a tag `v<semver>` matching the version in the manifests.
#   git tag v0.1.1 && git push origin v0.1.1
#
# The gate runs first and every publish job needs it (PKG-002's order applies to
# releases too): nothing reaches a registry that has not passed fmt/lint/tests
# on the tagged commit. A registry publish cannot be undone — crates.io and npm
# do not delete, PyPI will not let a version be reused, NuGet only unlists — so
# the gate is the last place a mistake is still cheap.
#
# Three lanes publish outside this file, each for its own reason:
#   - Go   — releases from a VCS module tag. Since `go/` became a submodule
#            that tag lives in ANOTHER repository, so it is a manual step this
#            workflow cannot perform (it would need write access to
#            hivellm/thunder-go). After tagging here:
#
#              cd go && git tag -a vX.Y.Z -m "vX.Y.Z" && git push origin vX.Y.Z
#
#            Skipping it does not fail anything loudly — `go get` simply
#            resolves no release, which is how v0.2.0 shipped with the Go lane
#            published in name only. The verify job below reports the tag, so
#            the omission is visible rather than silent.
#   - npm  — the @hivehub org requires an OTP on publish, which no stored
#            credential can provide. Published by hand; see the note below.
#   - NuGet — its job 403d on three consecutive releases and every one was
#            finished by hand, so the job was removed rather than left failing.
#            See the note by the pypi job for how to publish and how to try
#            restoring automation.
# All three are still gated: the gate runs their checks on the tagged commit,
# and the verify job reports what each registry actually has.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # One gate for the whole train. If this is red, no registry is touched.
  gate:
    name: quality gate (blocks every publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go/go.sum
      - name: Rust
        working-directory: rust
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-features -- -D warnings
          cargo test --workspace --all-features
      - name: TypeScript
        working-directory: typescript
        run: |
          npm ci
          npm run typecheck
          npm run lint
          npm test
      - name: Python
        working-directory: python
        run: |
          pip install -e ".[dev]"
          ruff check .
          pytest
      - name: C#
        working-directory: csharp
        run: |
          dotnet build -c Release -warnaserror
          dotnet test -c Release --no-build
      # Go is the fifth lane (PKG-050). It publishes from a VCS module tag, so it
      # has no publish job below — but the shared gate still runs fmt/vet/test on
      # the tagged commit, exactly as go/README.md promises.
      - name: Go
        working-directory: go
        run: |
          test -z "$(gofmt -l .)" || { echo 'gofmt found unformatted files'; gofmt -l .; exit 1; }
          go vet ./...
          go test ./...
      # The tag is the version. A tag that disagrees with the manifests would
      # publish something other than what it claims — and the wrong version
      # cannot be recalled from any of these registries.
      - name: Tag must match the manifests
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          fail=0
          check() { # name expected
            if [ "$2" != "$TAG" ]; then
              echo "::error::$1 is $2 but the tag says $TAG"; fail=1
            else
              echo "ok: $1 = $2"
            fi
          }
          check "rust workspace" "$(grep -m1 '^version' rust/Cargo.toml | cut -d'"' -f2)"
          check "typescript"     "$(node -p "require('./typescript/package.json').version")"
          check "python"         "$(grep -m1 '^version' python/pyproject.toml | cut -d'"' -f2)"
          check "csharp"         "$(grep -oPm1 '(?<=<Version>)[^<]+' csharp/HiveLLM.Thunder/HiveLLM.Thunder.csproj)"
          exit $fail

  crates:
    name: crates.io (thunder-rpc)
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      # The crate is `thunder-rpc`; `thunder` was taken (a dormant 2018 crate).
      # The lib name is still `thunder`, so consumers `use thunder::`.
      - name: Publish
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p thunder-rpc

  # npm has NO publish job, deliberately.
  #
  # The @hivehub org requires a one-time password on publish, and an OTP is a
  # human step by design — no token stored in GitHub's secret store can satisfy
  # it. A job that cannot authenticate would fail every release and train people
  # to ignore a red release run, which is worse than no job at all.
  #
  # So @hivehub/thunder is published by hand, from the tagged commit:
  #
  #   cd typescript && npm publish --access public
  #
  # What the train still guarantees for the npm package: the gate above runs
  # typecheck, lint and tests on the tagged commit, and the tag-vs-manifest
  # check still verifies typescript/package.json — so a hand publish cannot ship
  # a version the tag disagrees with, and cannot ship a red commit.
  #
  # (This costs the provenance attestation `--provenance` gave, which requires
  # the workflow's OIDC identity. If npm ever supports automation tokens that
  # bypass OTP for this org, restore the job rather than keep publishing by
  # hand.)

  pypi:
    name: PyPI (hivellm-thunder)
    needs: gate
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        working-directory: python
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      # Trusted Publishing: PyPI verifies this workflow's OIDC identity and
      # mints a short-lived token itself. There is NO API token to store, leak,
      # rotate, or find in a product repo — which is the whole point.
      #
      # One-time owner setup at https://pypi.org/manage/project/hivellm-thunder/settings/publishing/
      #   owner: hivellm | repo: thunder | workflow: release.yml | environment: pypi
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist

  # NuGet has NO publish job, by owner decision after three failed releases.
  #
  # The job returned 403 on 0.1.1, 0.2.0 and 0.2.1, and each was finished by
  # hand. A job that fails every release teaches people to ignore a red release
  # run, and that habit is more expensive than the manual step — a red run has
  # to mean something.
  #
  # Published by hand from the tagged commit:
  #
  #   cd csharp
  #   dotnet pack -c Release
  #   dotnet nuget push "HiveLLM.Thunder/bin/Release/HiveLLM.Thunder.<version>.nupkg" \
  #     -s https://api.nuget.org/v3/index.json -k "$NUGET_KEY"
  #
  # Name the exact file. A glob would also push whatever older .nupkg survives
  # in bin/Release — there are usually several — and a registry publish cannot
  # be undone.
  #
  # Unlike npm, this is NOT structurally unautomatable: npm needs an OTP, which
  # no stored credential can satisfy, while this is a credential problem and
  # credential problems have fixes. The same key works from a laptop and 403s
  # from the runner, which points at the stored secret rather than the key —
  # most often a trailing newline captured when pasting into GitHub, which
  # `dotnet nuget push` sends verbatim. If someone wants to try again: re-paste
  # the secret with no trailing whitespace, restore this job from git history
  # (it was removed in the 0.2.1 cycle), and cut a release. If it publishes,
  # keep it.
  #
  # Still gated either way: the gate above builds C# with -warnaserror and runs
  # its tests on the tagged commit, and the tag-vs-manifest check verifies the
  # .csproj version — so a hand publish cannot ship a red commit or a version
  # the tag disagrees with. The verify job below reports NuGet's published
  # version, so a forgotten hand publish surfaces instead of going unnoticed.

  # The release is not done until every registry actually has it (PKG-011).
  #
  # This is the check that was missing when NuGet sat at 0.1.0 while the other
  # three moved to 0.2.0: each publish job succeeded or failed on its own, and
  # nothing ever asked whether the *set* was consistent. npm is hand-published
  # (OTP), so this is also what catches a release where that step was
  # forgotten.
  #
  # `needs` the automated publishers so it runs after them. Two registries now
  # publish by hand (npm, NuGet) and may not be up yet when this fires — rerun
  # the job once they are. That is the intended workflow, not a flaw: this is
  # the only thing that will tell you a hand publish was forgotten, which is
  # exactly how NuGet sat a version behind before anyone noticed.
  verify:
    name: every registry has this release
    needs: [crates, pypi]
    runs-on: ubuntu-latest
    # `always()` so this still runs when a publish job failed — that is
    # precisely when the report is worth having. Without it, a failed NuGet
    # push skips the verify and the run says "nuget failed" without saying
    # which registries did get the release, which is what someone finishing
    # the publish by hand actually needs to know.
    if: always() && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Registries are not instantly consistent after a publish.
      - name: Let the registries settle
        run: sleep 120
      - name: Check published versions
        run: python scripts/check_published_versions.py tag "${GITHUB_REF_NAME}"

name: CI

# The authoritative PKG-002 matrix. Each lane runs the family quality gate in
# order — type-check -> lint -> tests — as sequential steps, so a lint failure
# stops the lane before tests run. That ordering is the requirement; splitting
# lint and test into parallel jobs would satisfy the letter and lose the point.
#
# Every lane ends with an explicit corpus step (TST-020/021). The corpus tests
# already run inside each suite, but a named step is what makes the coverage
# checkable at a glance instead of asserted in a comment — and it fails loudly
# if the vectors ever stop being loaded.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features
      - name: Conformance corpus (TST-020/021)
        run: cargo test -p thunder-rpc --test corpus --test cross_decode

  typescript:
    name: typescript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      # `npm ci` honours the lockfile; `npm install` would resolve fresh and
      # could green a build the lockfile cannot reproduce.
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Conformance corpus (TST-020/021)
        run: npx vitest run tests/corpus.test.ts

  python:
    name: python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      # Scoped to python/ so the package's own ruff config (pyproject.toml)
      # applies. The repo-root lint in python-lint.yml runs unconfigured.
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Conformance corpus (TST-020/021)
        run: pytest tests/test_corpus.py

  csharp:
    name: csharp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: csharp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      # -warnaserror is the C# lane's type-check and lint in one step.
      - name: Build
        run: dotnet build -warnaserror
      - name: Test
        run: dotnet test --no-build
      - name: Conformance corpus (TST-020/021)
        run: dotnet test --no-build --filter "FullyQualifiedName~CorpusTests"

  go:
    name: go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go/go.sum
      # `go vet` is the type-check step; `gofmt -l` is the lint step (it must
      # print nothing, so any unformatted file fails the lane before tests run).
      - name: Type-check
        run: go vet ./...
      - name: Lint
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"; echo "$unformatted"; exit 1
          fi
      - name: Test
        run: go test ./...
      - name: Conformance corpus (TST-020/021)
        run: go test ./conformance/ -run TestCorpusVectors -v

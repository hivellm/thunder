name: synap
scheme: synap
default_port: 15501
# BN-023 errata: was `none`, which described only the require_auth=false posture
# and left this profile unable to authenticate at all. Synap's RPC listener DOES
# authenticate inline in its read loop (AUTH -> shared UserManager, NOAUTH gate,
# NOPERM admin ACL) behind its `require_auth` toggle
# (synap-server/src/protocol/synap_rpc/server.rs:170-249). What it genuinely
# lacks is a HELLO handler -> hello_style stays null. Enforcement is deployment
# policy, not a dialect: a client with no credentials sends no AUTH.
handshake: auth_command    # AUTH <password> | AUTH <user> <password>; no HELLO (PRO-001)
hello_style: null
push: enabled              # SUBSCRIBE ships push frames with id = u32::MAX
max_frame_bytes: 536870912 # 512 MiB — matches synap-protocol MAX_FRAME_SIZE
max_in_flight: 256
error_codes: resp3_prefixes # ERR / NOAUTH / WRONGPASS / NOPERM
tls: "off"                 # quoted: YAML 1.1 loaders coerce bare off -> false

name: Release

# PKG-011: one release train — every registry publishes from ONE tag, in
# lockstep. Until this existed, releasing meant running four publish commands by
# hand, which is how a PyPI/NuGet token ends up living in a product repo. No
# credential belongs in a repository; the ones below live in GitHub's secret
# store, and PyPI needs no credential at all (see the pypi job).
#
# Trigger: push a tag `v<semver>` matching the version in the manifests.
#   git tag v0.1.1 && git push origin v0.1.1
#
# The gate runs first and every publish job needs it (PKG-002's order applies to
# releases too): nothing reaches a registry that has not passed fmt/lint/tests
# on the tagged commit. A registry publish cannot be undone — crates.io and npm
# do not delete, PyPI will not let a version be reused, NuGet only unlists — so
# the gate is the last place a mistake is still cheap.
#
# Every registry lane authenticates by OIDC trusted publishing — crates.io, npm,
# PyPI and NuGet. There is NO publishing credential in this repository's secrets
# and none to rotate: each registry verifies this workflow's identity and issues
# a credential that lives minutes to an hour.
#
# That took three separate failures to arrive at, and each one is worth
# remembering because the fix was never "store the token more carefully":
#   - NuGet 403d on three consecutive releases from a key that had silently
#     expired (they last at most a year).
#   - npm could not be automated at all, because the @hivehub org requires an
#     OTP and no *stored* credential can produce one.
#   - Both were being finished by hand, which is how a registry ends up a
#     version behind with nobody noticing.
# OIDC answers all of it: a credential that does not persist cannot go stale,
# cannot leak, and does not need a human to type a code.
#
# Two lanes still publish outside this file, both from a VCS tag:
#   - Go  — `hivellm/thunder-go`. Since `go/` became a submodule the tag lives
#           in ANOTHER repository, which this workflow has no write access to.
#   - PHP — `hivellm/thunder-php`, same arrangement (PKG-051).
# After tagging here, tag each submodule:
#
#     cd go  && git tag -a vX.Y.Z -m "vX.Y.Z" && git push origin vX.Y.Z
#     cd php && git tag -a vX.Y.Z -m "vX.Y.Z" && git push origin vX.Y.Z
#
# Skipping that fails nothing loudly — `go get` and Composer simply resolve no
# release, which is how v0.2.0 shipped with the Go lane published in name only.
# Both are gated, and the verify job reports their tags so the omission is
# visible rather than silent.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # One gate for the whole train. If this is red, no registry is touched.
  gate:
    name: quality gate (blocks every publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go/go.sum
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
      - name: Rust
        working-directory: rust
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-features -- -D warnings
          cargo test --workspace --all-features
      - name: TypeScript
        working-directory: typescript
        run: |
          npm ci
          npm run typecheck
          npm run lint
          npm test
      - name: Python
        working-directory: python
        run: |
          pip install -e ".[dev]"
          ruff check .
          pytest
      - name: C#
        working-directory: csharp
        run: |
          dotnet build -c Release -warnaserror
          dotnet test -c Release --no-build
      # Go is the fifth lane (PKG-050). It publishes from a VCS module tag, so it
      # has no publish job below — but the shared gate still runs fmt/vet/test on
      # the tagged commit, exactly as go/README.md promises.
      - name: Go
        working-directory: go
        run: |
          test -z "$(gofmt -l .)" || { echo 'gofmt found unformatted files'; gofmt -l .; exit 1; }
          go vet ./...
          go test ./...
      # PHP is the sixth lane (PKG-051), and like Go it releases from a VCS tag
      # rather than a push — so it has no publish job either, and this gate is
      # what stands between a red commit and a Packagist tag.
      - name: PHP
        working-directory: php
        run: |
          composer install --no-interaction --no-progress
          vendor/bin/phpstan analyse --no-progress
          vendor/bin/phpunit
      # The tag is the version. A tag that disagrees with the manifests would
      # publish something other than what it claims — and the wrong version
      # cannot be recalled from any of these registries.
      - name: Tag must match the manifests
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          fail=0
          check() { # name expected
            if [ "$2" != "$TAG" ]; then
              echo "::error::$1 is $2 but the tag says $TAG"; fail=1
            else
              echo "ok: $1 = $2"
            fi
          }
          check "rust workspace" "$(grep -m1 '^version' rust/Cargo.toml | cut -d'"' -f2)"
          check "typescript"     "$(node -p "require('./typescript/package.json').version")"
          check "python"         "$(grep -m1 '^version' python/pyproject.toml | cut -d'"' -f2)"
          check "csharp"         "$(grep -oPm1 '(?<=<Version>)[^<]+' csharp/HiveLLM.Thunder/HiveLLM.Thunder.csproj)"
          exit $fail

  crates:
    name: crates.io (thunder-rpc)
    needs: gate
    runs-on: ubuntu-latest
    environment: crates
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      # Trusted Publishing: crates.io verifies this workflow's OIDC identity and
      # mints a 30-minute token. No CARGO_REGISTRY_TOKEN to store or rotate.
      #
      # One-time owner setup at https://crates.io/crates/thunder-rpc/settings
      #   owner: hivellm | repository: thunder | workflow: release.yml
      #   environment: crates
      #
      # Request the token immediately before publishing: it is short-lived, and
      # a slow build between the two steps would burn the window.
      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      # The crate is `thunder-rpc`; `thunder` was taken (a dormant 2018 crate).
      # The lib name is still `thunder`, so consumers `use thunder::`.
      - name: Publish
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p thunder-rpc

  npm:
    name: npm (@hivehub/thunder)
    needs: gate
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      # Node 22, and only here. The package supports Node >=18 and the test
      # matrix still proves that — this version is the *publisher's*, not the
      # consumer's. Trusted publishing needs Node >= 22.14 and npm >= 11.5.1,
      # which is why the rest of the workflow can stay on 20.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Require an npm new enough for trusted publishing
        working-directory: typescript
        run: |
          npm install -g npm@latest
          npm --version
      - name: Build
        working-directory: typescript
        run: |
          npm ci
          npm run build
      # Trusted Publishing: npm verifies this workflow's OIDC identity and mints
      # a short-lived credential itself. There is NO token to store, leak or
      # rotate — the same model PyPI uses above, and the reason this job can
      # exist at all: the @hivehub org's OTP requirement is what no *stored
      # credential* could satisfy, and OIDC is not a stored credential.
      #
      # One-time owner setup at
      # https://www.npmjs.com/package/@hivehub/thunder/access
      #   organization: hivellm | repository: thunder | workflow: release.yml
      #   environment: npm | allowed actions: npm publish
      #
      # No `--provenance` flag: trusted publishing attaches provenance
      # automatically, and passing it explicitly is not how this path works.
      - name: Publish
        working-directory: typescript
        run: npm publish --access public

  pypi:
    name: PyPI (hivellm-thunder)
    needs: gate
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        working-directory: python
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      # Trusted Publishing: PyPI verifies this workflow's OIDC identity and
      # mints a short-lived token itself. There is NO API token to store, leak,
      # rotate, or find in a product repo — which is the whole point.
      #
      # One-time owner setup at https://pypi.org/manage/project/hivellm-thunder/settings/publishing/
      #   owner: hivellm | repo: thunder | workflow: release.yml | environment: pypi
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist

  nuget:
    name: NuGet (HiveLLM.Thunder)
    needs: gate
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Pack
        working-directory: csharp
        run: dotnet pack -c Release
      # This job existed before, returned 403 on three consecutive releases, and
      # was deleted. The cause was a stored API key that had gone stale — NuGet
      # keys expire at 365 days, silently — and every release was finished by
      # hand.
      #
      # Trusted Publishing removes the thing that broke: there is no stored key.
      # nuget.org verifies this workflow's OIDC identity and issues a key that
      # lives one hour. A credential that cannot go stale cannot go stale
      # unnoticed.
      #
      # One-time owner setup at https://www.nuget.org/account/trustedpublishing
      #   repository owner: hivellm | repository: thunder
      #   workflow file: release.yml   (file name only, no path)
      #   environment: nuget
      #
      # `user` is the nuget.org PROFILE NAME, not an email address. It is not a
      # secret, but it lives in one so the workflow does not have to be edited
      # if the account changes.
      - name: NuGet login (OIDC to a one-hour key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Publish
        working-directory: csharp
        # The exact file, not a glob. On a clean runner a glob matches one
        # package and works by luck; if an older version's .nupkg ever survives
        # in bin/Release the glob would push that too — and a registry publish
        # cannot be undone.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE="HiveLLM.Thunder/bin/Release/HiveLLM.Thunder.${VERSION}.nupkg"
          test -f "$PACKAGE" || { echo "::error::$PACKAGE was not produced by dotnet pack"; exit 1; }
          dotnet nuget push "$PACKAGE" \
            -s https://api.nuget.org/v3/index.json \
            -k "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate

  # The release is not done until every registry actually has it (PKG-011).
  #
  # This is the check that was missing when NuGet sat at 0.1.0 while the other
  # three moved to 0.2.0: each publish job succeeded or failed on its own, and
  # nothing ever asked whether the *set* was consistent. NuGet is still
  # hand-published, so this is also what catches a release where that step was
  # forgotten.
  #
  # `needs` every publisher, all four of which are now automated. This still
  # earns its place: a job can succeed and leave the registry inconsistent (a
  # `--skip-duplicate` that skipped the wrong thing, a publish that landed under
  # a different version), and nothing else asks whether the *set* agrees. That
  # question going unasked is how NuGet sat at 0.1.0 while the other three moved
  # to 0.2.0.
  verify:
    name: every registry has this release
    needs: [crates, npm, pypi, nuget]
    runs-on: ubuntu-latest
    # `always()` so this still runs when a publish job failed — that is
    # precisely when the report is worth having. Without it, a failed NuGet
    # push skips the verify and the run says "nuget failed" without saying
    # which registries did get the release, which is what someone finishing
    # the publish by hand actually needs to know.
    if: always() && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Registries are not instantly consistent after a publish.
      - name: Let the registries settle
        run: sleep 120
      - name: Check published versions
        run: python scripts/check_published_versions.py tag "${GITHUB_REF_NAME}"
